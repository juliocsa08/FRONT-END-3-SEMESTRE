<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .corsim{
            color: red;
        }
        .cornao{
            color: blue;
        }
    </style>
</head>
<body>
    <input type="text" onblur="getElements(this.value);" placeholder="digite o nome da classe">
    <button onclick="getElements();">Pegar Elementos</button>
    <ul>

        <li class="corsim">item 1</li>
        <li class="cornao">item 2</li>
        <li class="corsim">item 3</li>
        <li class="cornao">item 4</li>
        <li class="teste">novo item 1</li>
        <li class="teste">novo item 2</li>
        <li class="teste">novo item 3</li>
        <li class="teste">novo item 4</li>
    </ul>
    <script>

        function getElements(nomeClasse = "cornao"){
            cornoes = document.getElementsByClassName(nomeClasse);

            // console.log(cornoes);
            // console.log(cornoes[0]);
            //  console.log(cornoes[0].textContent);

            for(let i = 0; i < cornoes.length; i++){
                console.log(cornoes[i].textContent);
            }
        }
    </script>
</body>
</html>
